services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - node-exporter
    networks:
      - default
      - boostus_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://boostus_proxy:8081/nginx_status
      - --no-nginx.ssl-verify
    ports:
      - "9113:9113"
    networks:
      - boostus_network
      - default

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://boostus_redis:6379
    ports:
      - "9121:9121"
    networks:
      - default
      - boostus_network

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysqld-exporter
    restart: unless-stopped
    command:
      - --config.my-cnf=/etc/mysqld_exporter/.my.cnf
      - --mysqld.address=boostus_db:3306
    volumes:
      - ./.exporter/mysql/.my.cnf:/etc/mysqld_exporter/.my.cnf:ro
    ports:
      - "9104:9104"
    networks:
      - default
      - boostus_network


networks:
  boostus_network:
    external: true

volumes:
  grafana_data:
