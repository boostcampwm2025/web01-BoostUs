services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro"
    networks:
      - boostus_monitoring

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - node-exporter
    networks:
      - boostus_monitoring

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - boostus_monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - boostus_monitoring

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://boostus_proxy:8081/nginx_status
      - --no-nginx.ssl-verify
    networks:
      - boostus_monitoring

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://boostus_redis:6379
    networks:
      - boostus_monitoring
      - boostus_data

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: mysqld-exporter
    restart: unless-stopped
    command:
      - --config.my-cnf=/etc/mysqld_exporter/.my.cnf
      - --mysqld.address=boostus_db:3306
    volumes:
      - ./.exporter/mysql/.my.cnf:/etc/mysqld_exporter/.my.cnf:ro
    networks:
      - boostus_monitoring
      - boostus_data

networks:
  boostus_monitoring:
    external: true
  boostus_data:
    external: true

volumes:
  grafana_data:
  prometheus_data:
